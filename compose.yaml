services:
  db:
    image: 'postgres:15'
    container_name: inventory_test_db
    environment:
      - POSTGRES_DB=autoflex_test_db
      - POSTGRES_PASSWORD=psswrd_autoflex
      - POSTGRES_USER=admin
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d autoflex_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: inventory_api
    ports:
      - '8080:8080'
    environment:
      - SPRING_DOCKER_COMPOSE_ENABLED=false
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/autoflex_test_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=psswrd_autoflex
    volumes:
      - .:/app
      - ~/.m2:/root/.m2

  frontend:
    build: ../inventory-front-projedatatest
    container_name: autoflex_test_frontend
    ports:
      - '5173:5173'
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8080/api
